<ion-content [fullscreen]="true">

  <div class="topo">
    <h2>Não possui uma conta?</h2>
    <h3>Faça seu Cadastro.</h3>
    <img src="assets/image.png" alt="Raízes e Letras">
  </div>

  <div class="formulario">
    <ion-item>
      <ion-input placeholder="E-mail"></ion-input>
    </ion-item>

    <ion-item>
      <ion-input placeholder="Nome de Usuário"></ion-input>
    </ion-item>

    <ion-item>
      <ion-input type="password" placeholder="Senha"></ion-input>
      <ion-icon name="eye-outline" slot="end"></ion-icon>
    </ion-item>

    <ion-item>
      <ion-input type="password" placeholder="Confirme sua Senha"></ion-input>
      <ion-icon name="eye-outline" slot="end"></ion-icon>
    </ion-item>

    <div class="btn-cadastro">
      <ion-button>Cadastrar-se</ion-button>
    </div>

    <p class="link-login">
      Já possui uma conta? <a routerLink="/home">Faça login</a>
    </p>

  </div>

</ion-content>
